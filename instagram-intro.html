<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Archetype Studios — Instagram Intro Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#00A8FF;--magenta:#E91E8C;--cyan:#00E5D4;
  --red:#BE1323;--gold:#FFB800;--violet:#6B00C8;
  --space:#070A17;--midnight:#0C1025;--void:#030508;
  --white:#FFFFFF;--off:#C8D0E0;--muted:#5A6478;
}

html,body{width:1080px;height:1080px;overflow:hidden;background:#111;}

/* ── PAGE CHROME ── */
body{
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;
  font-family:'DM Sans',sans-serif;
  background:#0A0A0A;
  padding:40px 0 24px;
  gap:20px;
}

.ui-label{
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;
  color:#333;
}

/* ── POST FRAME ── */
.post{
  width:1000px;height:1000px;flex-shrink:0;
  position:relative;overflow:hidden;
  background:var(--void);
  border-radius:4px;
}

/* ── CANVAS ── */
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;}

/* ── BACKGROUND IMAGE ── */
.bg-img{
  position:absolute;inset:0;z-index:0;
  background-image:url('assets/images/Introduction.png');
  background-size:cover;background-position:center;
  opacity:0.12;
}

/* ── GRADIENT OVERLAY ── */
.overlay{
  position:absolute;inset:0;z-index:2;
  background:
    radial-gradient(ellipse 90% 75% at 50% 50%,
      transparent 10%,
      rgba(3,5,8,0.55) 55%,
      rgba(3,5,8,0.92) 100%),
    linear-gradient(to bottom,
      rgba(3,5,8,0.7) 0%,
      rgba(3,5,8,0.0) 28%,
      rgba(3,5,8,0.0) 72%,
      rgba(3,5,8,0.85) 100%),
    radial-gradient(ellipse 50% 50% at 50% 50%,
      rgba(0,168,255,0.05) 0%,
      transparent 70%);
}

/* ── GRID TEXTURE ── */
.grid-tex{
  position:absolute;inset:0;z-index:3;
  background-image:
    linear-gradient(rgba(0,168,255,0.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,168,255,0.028) 1px,transparent 1px);
  background-size:55px 55px;
}

/* ── CORNER MARKS ── */
.corners{position:absolute;inset:0;z-index:4;pointer-events:none;}
.corner{position:absolute;width:22px;height:22px;}
.corner::before,.corner::after{content:'';position:absolute;background:rgba(0,168,255,0.45);}
.corner::before{height:1.5px;width:100%;}
.corner::after{width:1.5px;height:100%;}
.corner.tl{top:36px;left:36px;}
.corner.tl::before{top:0;left:0;}
.corner.tl::after{top:0;left:0;}
.corner.tr{top:36px;right:36px;transform:scaleX(-1);}
.corner.tr::before{top:0;left:0;}
.corner.tr::after{top:0;left:0;}
.corner.bl{bottom:36px;left:36px;transform:scaleY(-1);}
.corner.bl::before{top:0;left:0;}
.corner.bl::after{top:0;left:0;}
.corner.br{bottom:36px;right:36px;transform:scale(-1);}
.corner.br::before{top:0;left:0;}
.corner.br::after{top:0;left:0;}

/* ── CONTENT ── */
.content{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;
  padding:70px 80px;
  text-align:center;
}

/* Top badge */
.badge{
  display:flex;align-items:center;gap:10px;
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:0.32em;text-transform:uppercase;
  color:rgba(0,168,255,0.7);
  margin-bottom:48px;
}
.badge-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--blue);
  box-shadow:0 0 6px var(--blue),0 0 14px rgba(0,168,255,0.6);
  animation:dotPulse 2.4s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{box-shadow:0 0 6px var(--blue),0 0 14px rgba(0,168,255,0.5);}50%{box-shadow:0 0 10px var(--blue),0 0 28px rgba(0,168,255,0.9);}}

/* Logo mark */
.mark-wrap{
  width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:36px;position:relative;
}
.mark-glow-ring{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(ellipse at center,rgba(0,168,255,0.14) 0%,transparent 70%);
  animation:glowRing 4s ease-in-out infinite;
}
@keyframes glowRing{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.1);opacity:1;}}
.mark-wrap img{
  width:100px;height:auto;position:relative;z-index:2;
  filter:drop-shadow(0 0 20px rgba(0,168,255,0.6)) drop-shadow(0 0 50px rgba(0,168,255,0.3)) drop-shadow(0 0 100px rgba(0,168,255,0.15));
  animation:markFloat 6s ease-in-out infinite;
}
@keyframes markFloat{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 20px rgba(0,168,255,0.6)) drop-shadow(0 0 50px rgba(0,168,255,0.3));}50%{transform:translateY(-6px);filter:drop-shadow(0 0 32px rgba(0,168,255,0.9)) drop-shadow(0 0 80px rgba(0,168,255,0.45));}}

/* Eyebrow line */
.eyebrow-line{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-bottom:14px;
}
.eyebrow-rule{width:52px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,168,255,0.5));}
.eyebrow-rule.rev{background:linear-gradient(90deg,rgba(0,168,255,0.5),transparent);}
.eyebrow-text{
  font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.34em;text-transform:uppercase;
  color:rgba(0,168,255,0.55);
}

/* Main title */
.title-block{margin-bottom:0;line-height:1;}
.title-row{
  display:flex;align-items:baseline;justify-content:center;
  gap:0.18em;line-height:1;
}
.t-arrow{
  font-size:68px;color:var(--red);font-weight:400;
  font-family:'Syne',sans-serif;
  text-shadow:0 0 30px rgba(190,19,35,0.5);
  line-height:1;
}
.t-main{
  font-family:'Syne',sans-serif;
  font-size:92px;font-weight:800;
  letter-spacing:-0.01em;text-transform:uppercase;
  line-height:1;
  background:linear-gradient(135deg,var(--blue) 0%,var(--cyan) 38%,#8B5CF6 70%,var(--blue) 100%);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 8s ease-in-out infinite;
}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.t-studios{
  font-family:'Syne',sans-serif;
  font-size:92px;font-weight:800;
  letter-spacing:-0.01em;text-transform:uppercase;
  color:var(--white);line-height:1;display:block;
  text-shadow:0 2px 40px rgba(255,255,255,0.08);
}

/* Spectrum divider */
.spectrum-rule{
  width:180px;height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),var(--magenta),transparent);
  border-radius:2px;
  margin:32px auto;
  position:relative;overflow:hidden;
}
.spectrum-rule::after{
  content:'';
  position:absolute;top:-3px;left:-20%;width:20%;height:8px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),var(--magenta),transparent);
  filter:blur(3px);
  animation:specBeam 5s ease-in-out infinite 1s;
}
@keyframes specBeam{0%{transform:translateX(-100%);opacity:0;}8%{opacity:1;}92%{opacity:1;}100%{transform:translateX(700%);opacity:0;}}

/* Tagline */
.tagline{
  font-family:'Space Grotesk',sans-serif;
  font-size:18px;font-weight:500;
  letter-spacing:0.06em;
  color:rgba(200,208,224,0.82);
  line-height:1.55;
  margin-bottom:0;
}
.tagline strong{
  color:var(--white);font-weight:600;
}
.tagline em{
  font-style:normal;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-weight:600;
}

/* Service pills */
.pills{
  display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;justify-content:center;
  margin-top:28px;
}
.pill{
  font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(200,208,224,0.45);
}
.pill-dot{
  width:3px;height:3px;border-radius:50%;
  background:rgba(0,168,255,0.45);display:inline-block;
}

/* Bottom strip */
.bottom-strip{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  height:68px;
  background:rgba(3,5,8,0.7);
  border-top:1px solid rgba(0,168,255,0.08);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;
}
.bs-logo{display:flex;align-items:center;gap:10px;}
.bs-logo img{height:22px;width:auto;filter:drop-shadow(0 0 6px rgba(0,168,255,0.4));}
.bs-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.7);}
.bs-handle{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.06em;color:var(--blue);}
.bs-tag{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);color:#3A4560;}

/* Neon glow line at bottom of strip */
.bottom-strip::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,168,255,0.3) 25%,rgba(0,229,212,0.25) 50%,rgba(233,30,140,0.2) 75%,transparent 100%);
}

/* ── GLITCH accent behind title ── */
.glitch-layer{
  position:absolute;
  font-family:'Syne',sans-serif;
  font-size:92px;font-weight:800;
  letter-spacing:-0.01em;text-transform:uppercase;
  color:transparent;user-select:none;pointer-events:none;
  top:50%;left:50%;transform:translate(-50%,-50%);
  white-space:nowrap;
}
.glitch-layer::before{
  content:'ARCHETYPE';
  position:absolute;
  left:-2px;top:0;
  color:rgba(190,19,35,0.12);
  clip-path:polygon(0 35%,100% 35%,100% 50%,0 50%);
}
.glitch-layer::after{
  content:'ARCHETYPE';
  position:absolute;
  left:2px;top:0;
  color:rgba(0,168,255,0.1);
  clip-path:polygon(0 55%,100% 55%,100% 68%,0 68%);
}
</style>
</head>
<body>

<div class="post">
  <!-- Layers -->
  <div class="bg-img"></div>
  <canvas id="c"></canvas>
  <div class="overlay"></div>
  <div class="grid-tex"></div>
  <!-- Corner marks -->
  <div class="corners">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <!-- Main content -->
  <div class="content">

    <div class="badge">
      <div class="badge-dot"></div>
      Introducing
      <div class="badge-dot"></div>
    </div>

    <div class="mark-wrap">
      <div class="mark-glow-ring"></div>
      <img src="../Logos/logomark-white.svg" alt="Archetype Studios">
    </div>

    <div class="eyebrow-line">
      <div class="eyebrow-rule"></div>
      <span class="eyebrow-text">We've Arrived</span>
      <div class="eyebrow-rule rev"></div>
    </div>

    <div class="title-block">
      <div class="title-row">
        <span class="t-arrow">→</span>
        <span class="t-main">Archetype</span>
      </div>
      <span class="t-studios">Studios</span>
    </div>

    <div class="spectrum-rule"></div>

    <p class="tagline">
      <strong>Marketing with Purpose.</strong><br>
      <em>Powered by Insight.</em>
    </p>

    <div class="pills">
      <span class="pill">Brand Strategy</span>
      <span class="pill-dot"></span>
      <span class="pill">Creative Direction</span>
      <span class="pill-dot"></span>
      <span class="pill">Campaign Architecture</span>
      <span class="pill-dot"></span>
      <span class="pill">Digital Marketing</span>
    </div>

  </div>

  <!-- Bottom strip -->
  <div class="bottom-strip">
    <div class="bs-logo">
      <img src="../Logos/logomark-white.svg" alt="mark">
      <span class="bs-name">Archetype Studios</span>
    </div>
    <span class="bs-handle">@archetypestudios</span>
    <span class="bs-tag">archetypestudios.com</span>
  </div>
</div>

<script>
/* Neon particle canvas */
(function(){
  const c=document.getElementById('c');
  const ctx=c.getContext('2d');
  c.width=1000;c.height=1000;
  const COLS=['rgba(0,168,255,','rgba(233,30,140,','rgba(0,229,212,','rgba(107,0,200,','rgba(190,19,35,'];
  const pts=[];
  for(let i=0;i<70;i++){
    pts.push({
      x:Math.random()*1000,y:Math.random()*1000,
      vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
      r:Math.random()*1.6+.3,
      col:COLS[Math.floor(Math.random()*COLS.length)],
      a:Math.random()*.45+.08,
      ph:Math.random()*Math.PI*2
    });
  }
  function frame(){
    ctx.clearRect(0,0,1000,1000);
    const t=Date.now()/1000;
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-30)p.x=1030;if(p.x>1030)p.x=-30;
      if(p.y<-30)p.y=1030;if(p.y>1030)p.y=-30;
      const a=p.a*(.65+.35*Math.sin(t*1.1+p.ph));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col+a+')';ctx.fill();
    });
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=pts[i].col+(0.055*(1-d/90))+')';ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
